  <line x1='2265' y1='488' x2='3460' y2='488' class='divider'/>

  <rect x='2270' y='525' width='570' height='240' rx='18' class='box-red'/>
  <text x='2305' y='568' class='h'>Global Modals</text>
  <text x='2305' y='612' class='body2'>GameModal: 點選 GameCard / Rail 後開啟</text>
  <text x='2305' y='646' class='body2'>SignInModal: Login、Register、未登入保護</text>
  <text x='2305' y='680' class='body2'>CustomerServiceModal: showSupport 控制</text>
  <text x='2305' y='714' class='small'>目前 showSupport 未在已讀檔案中被觸發</text>

  <rect x='2900' y='525' width='560' height='240' rx='18' class='box-blue'/>
  <text x='2935' y='568' class='h'>Game Components</text>
  <text x='2935' y='612' class='body2'>Rail、FilteredGrid、CategoryView</text>
  <text x='2935' y='646' class='body2'>GameCard 提供遊戲卡片與 open event</text>
  <text x='2935' y='680' class='body2'>CategoryView 支援 All / Favorites</text>
  <text x='2935' y='714' class='body2'>FilteredGrid 支援搜尋、provider chips、排序</text>

  <rect x='2270' y='805' width='570' height='200' rx='18' class='box-green'/>
  <text x='2305' y='848' class='h'>Layout Components</text>
  <text x='2305' y='892' class='body2'>Sidebar、TopBar、AppFooter、MobileNav</text>
  <text x='2305' y='926' class='body2'>桌面側欄可折疊，手機側欄有 backdrop</text>
  <text x='2305' y='960' class='body2'>主內容包在 container 中</text>

  <rect x='2900' y='805' width='560' height='200' rx='18' class='box-purple'/>
  <text x='2935' y='848' class='h'>UI / Composables</text>
  <text x='2935' y='892' class='body2'>Icon.vue 提供圖示外觀</text>
  <text x='2935' y='926' class='body2'>useFavorites 管理收藏遊戲</text>
  <text x='2935' y='960' class='body2'>useTweaks 寫入 CSS variables 與 localStorage</text>

  <path class='link-soft' d='M 2150 655 C 2185 655 2195 655 2230 655'/>
  <path class='link-soft' d='M 2150 900 C 2185 900 2195 900 2230 900'/>

