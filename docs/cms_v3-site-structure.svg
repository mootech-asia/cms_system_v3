<svg xmlns='http://www.w3.org/2000/svg' width='3600' height='2600' viewBox='0 0 3600 2600' role='img' aria-labelledby='title desc'>
  <title id='title'>cms_v3 Website Structure Diagram</title>
  <desc id='desc'>A single-page large format structure diagram for the cms_v3 Vue 3 website, based on the existing repository content.</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#08111f'/>
      <stop offset='50%' stop-color='#0e1729'/>
      <stop offset='100%' stop-color='#071827'/>
    </linearGradient>
    <linearGradient id='blue' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#1d4ed8'/>
      <stop offset='100%' stop-color='#0ea5e9'/>
    </linearGradient>
    <linearGradient id='green' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#047857'/>
      <stop offset='100%' stop-color='#22c55e'/>
    </linearGradient>
    <linearGradient id='purple' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#6d28d9'/>
      <stop offset='100%' stop-color='#d946ef'/>
    </linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='18' stdDeviation='18' flood-color='#000000' flood-opacity='0.28'/>
    </filter>
    <marker id='arrow' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='10' markerHeight='10' orient='auto-start-reverse'>
      <path d='M 0 0 L 10 5 L 0 10 z' fill='#60a5fa'/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .sheet { fill: rgba(15, 23, 42, 0.72); stroke: rgba(148, 163, 184, 0.32); stroke-width: 2; filter: url(#shadow); }
      .panel { fill: rgba(15, 23, 42, 0.84); stroke: rgba(148, 163, 184, 0.36); stroke-width: 2; }
      .panel-soft { fill: rgba(30, 41, 59, 0.78); stroke: rgba(148, 163, 184, 0.28); stroke-width: 2; }
      .box-blue { fill: rgba(37, 99, 235, 0.16); stroke: #60a5fa; stroke-width: 3; }
      .box-green { fill: rgba(16, 185, 129, 0.14); stroke: #34d399; stroke-width: 3; }
      .box-purple { fill: rgba(168, 85, 247, 0.15); stroke: #c084fc; stroke-width: 3; }
      .box-amber { fill: rgba(245, 158, 11, 0.13); stroke: #fbbf24; stroke-width: 3; }
      .box-red { fill: rgba(239, 68, 68, 0.12); stroke: #f87171; stroke-width: 3; }
      .pill { fill: rgba(15, 23, 42, 0.72); stroke: rgba(148, 163, 184, 0.34); stroke-width: 2; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 54px; font-weight: 800; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 25px; fill: #cbd5e1; }
      .section { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #f8fafc; }
      .h { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 27px; font-weight: 750; fill: #e2e8f0; }
      .body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 22px; fill: #dbeafe; }
      .body2 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 21px; fill: #cbd5e1; }
      .small { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 18px; fill: #94a3b8; }
      .tag { font-family: SFMono-Regular, Menlo, Consolas, monospace; font-size: 20px; fill: #bae6fd; }
      .link { stroke: #60a5fa; stroke-width: 4; fill: none; marker-end: url(#arrow); opacity: 0.86; }
      .link-soft { stroke: #38bdf8; stroke-width: 3; fill: none; marker-end: url(#arrow); opacity: 0.55; stroke-dasharray: 10 10; }
      .divider { stroke: rgba(148, 163, 184, 0.28); stroke-width: 2; }
