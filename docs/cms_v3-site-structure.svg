  </defs>

  <rect class='bg' width='3600' height='2600'/>
  <rect x='44' y='44' width='3512' height='2512' rx='34' class='sheet'/>

  <text x='100' y='118' class='title'>cms_v3 網站結構圖</text>
  <text x='100' y='160' class='subtitle'>Vue 3 + Vite 單頁應用。依據 README.md、App.vue、layout、navigation、data 與主要 components 整理。</text>
  <text x='2860' y='120' class='tag'>repo: mootech-asia/cms_v3</text>
  <text x='2860' y='154' class='tag'>branch: claude/folder-upload-preview-url-5tzplm</text>

  <rect x='100' y='205' width='740' height='135' rx='18' class='box-blue'/>
  <text x='130' y='252' class='h'>1. Handoff Bundle</text>
  <text x='130' y='292' class='body'>README.md 指示先讀 chats，再讀 project/index.html</text>
  <text x='130' y='322' class='small'>現有實作落在 vue3-app</text>

  <rect x='960' y='205' width='740' height='135' rx='18' class='box-green'/>
  <text x='990' y='252' class='h'>2. Vue 入口</text>
  <text x='990' y='292' class='body'>main.js 建立 App 並掛載 #app</text>
  <text x='990' y='322' class='small'>載入 assets/layout.css + assets/main.css</text>

  <rect x='1820' y='205' width='780' height='135' rx='18' class='box-purple'/>
  <text x='1850' y='252' class='h'>3. App.vue 狀態路由</text>
  <text x='1850' y='292' class='body'>activeCat 決定主頁面，catTab 決定 Lobby 分頁</text>
  <text x='1850' y='322' class='small'>沒有 vue-router，所有畫面由條件渲染切換</text>

  <rect x='2720' y='205' width='780' height='135' rx='18' class='box-amber'/>
  <text x='2750' y='252' class='h'>4. Mock Data + Tweaks</text>
  <text x='2750' y='292' class='body'>data/index.js 提供遊戲、活動、贏家、錦標賽</text>
  <text x='2750' y='322' class='small'>useTweaks 控制 theme、accent、showPromos</text>

  <path class='link' d='M 842 272 L 950 272'/>
  <path class='link' d='M 1702 272 L 1810 272'/>
  <path class='link' d='M 2602 272 L 2710 272'/>

  <rect x='100' y='410' width='760' height='760' rx='24' class='panel'/>
  <text x='135' y='465' class='section'>導航輸入 Navigation Inputs</text>
  <line x1='135' y1='488' x2='825' y2='488' class='divider'/>

  <rect x='135' y='525' width='690' height='255' rx='18' class='panel-soft'/>
  <text x='165' y='566' class='h'>Sidebar.vue</text>
  <text x='165' y='608' class='body2'>搜尋：Search any game or provider</text>
  <text x='165' y='642' class='body2'>主選單：Lobby、Account Overview、Betting Record</text>
  <text x='165' y='676' class='body2'>Deposit Record、Profit And Loss、Withdrawal Record</text>
  <text x='165' y='710' class='body2'>Account Record、Personal Info、Security Center</text>
  <text x='165' y='744' class='body2'>語言、Deposit、Withdrawal、Support、折疊側欄</text>

  <rect x='135' y='810' width='690' height='175' rx='18' class='panel-soft'/>
  <text x='165' y='850' class='h'>TopBar.vue</text>
  <text x='165' y='892' class='body2'>Logo 回首頁、Login、Register、Theme toggle</text>
  <text x='165' y='926' class='body2'>登入後：Balance、Points、User menu、Logout</text>
  <text x='165' y='960' class='body2'>User menu 導到 Personal Info、Security Center、WithdrawalForm</text>

  <rect x='135' y='1015' width='690' height='120' rx='18' class='panel-soft'/>
  <text x='165' y='1055' class='h'>MobileNav.vue</text>
  <text x='165' y='1097' class='body2'>Browse、Home、Deposit、Promotion、Member</text>

  <rect x='930' y='410' width='1220' height='760' rx='24' class='panel'/>
  <text x='965' y='465' class='section'>App.vue 狀態中心與 Layout</text>
  <line x1='965' y1='488' x2='2110' y2='488' class='divider'/>

  <rect x='970' y='525' width='520' height='235' rx='18' class='box-blue'/>
  <text x='1005' y='568' class='h'>核心狀態</text>
  <text x='1005' y='610' class='body2'>activeCat: 主內容分流</text>
  <text x='1005' y='644' class='body2'>catTab: Lobby 內部分頁</text>
  <text x='1005' y='678' class='body2'>user: 登入狀態與會員頁權限</text>
  <text x='1005' y='712' class='body2'>balance: 模擬餘額浮動</text>
  <text x='1005' y='746' class='body2'>openGame、showSignIn、showSupport</text>

  <rect x='1540' y='525' width='570' height='235' rx='18' class='box-green'/>
  <text x='1575' y='568' class='h'>AppLayout.vue</text>
  <text x='1575' y='610' class='body2'>shell-sidebar: Sidebar slot</text>
  <text x='1575' y='644' class='body2'>shell-header: TopBar slot</text>
  <text x='1575' y='678' class='body2'>shell-content: 主內容 slot</text>
  <text x='1575' y='712' class='body2'>footer: AppFooter slot</text>
  <text x='1575' y='746' class='body2'>mobile-nav: 手機底部導覽</text>

  <rect x='970' y='800' width='1140' height='190' rx='18' class='box-purple'/>
  <text x='1005' y='843' class='h'>渲染策略</text>
  <text x='1005' y='886' class='body2'>activeCat === Lobby 時顯示首頁與遊戲大廳。</text>
  <text x='1005' y='920' class='body2'>activeCat 為會員、存提款、記錄或客服時，切換對應頁面元件。</text>
  <text x='1005' y='954' class='body2'>未列入的 activeCat 會進入 fallback：顯示 coming soon。</text>

  <rect x='970' y='1025' width='1140' height='105' rx='18' class='box-amber'/>
  <text x='1005' y='1068' class='h'>登入保護</text>
  <text x='1005' y='1110' class='body2'>Sidebar 內非 Lobby 功能大多需要 user；未登入會開 SignInModal。</text>

  <path class='link-soft' d='M 860 780 C 895 780 905 780 930 780'/>
  <path class='link-soft' d='M 860 990 C 895 990 905 990 930 990'/>

